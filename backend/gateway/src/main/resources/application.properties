spring.application.name=gateway
server.port=8080

spring.cloud.gateway.server.webflux.routes[0].id=backend-for-frontend
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

management.endpoints.web.exposure.include=health,info
